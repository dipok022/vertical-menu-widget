<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./scss/support-system.css" />
    <link rel="stylesheet" href="../../css/dashicons.css" />
    <title>Support System</title>
  </head>
  <body>
    <!-- Design 1 -->
    <section style="background-color: #f4f6f7; padding: 100px 0">
      <div class="container">
        <h2 class="header-title">Design 1</h2>

        <div class="thha-support-system thha-presets-1">
          <div class="thha-support-wrapper">
            <div class="thha-support-img">
              <img src="./img/image.png" alt="" />
            </div>

            <div class="thha-support-form-wrap">
              <div class="thha-support-header">
                <h2>Support Request</h2>
                <p>Enter your Credentials to access your account</p>
              </div>

              <div class="thha-support-form">
                <div class="form-group">
                  <label for="name">Your Name*</label>
                  <input
                    id="name"
                    name="name"
                    placeholder="Your Name"
                    type="text"
                  />
                </div>
                <div class="form-group">
                  <label for="email">Email*</label>
                  <input
                    id="email"
                    name="email"
                    placeholder="Purchase Email Address"
                    type="email"
                  />
                </div>

                <div class="form-group">
                  <label for="subject">Subject/Your Issue*</label>
                  <input
                    id="subject"
                    name="subject"
                    placeholder="Your Message Subject"
                    type="text"
                  />
                </div>

                <div class="form-group">
                  <label for="description">Description*</label>
                  <textarea
                    id="description"
                    name="description"
                    placeholder="Please Describe"
                    rows="8"
                  ></textarea>
                </div>

                <button type="button" class="thha-support-btn">
                  <span>Send Support Ticket</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Design 2 -->
    <section style="background-color: #fff; padding: 100px 0">
      <div class="container">
        <h2 class="header-title">Design 2</h2>

        <div class="thha-support-system thha-presets-2">
          <div class="thha-support-wrapper">
            <div class="thha-support-img-wrap">
              <h2>Support Request</h2>

              <div class="thha-support-img">
                <img
                  src="./img/corporate-woman-reading-medium-shot.png"
                  alt=""
                />

                <div class="thha-tag">
                  Empowering Brands Through Creative Design Solutions for
                  business.
                  <img class="mini-logo" src="./img/mini-logo.png" alt="" />
                </div>
              </div>
              <p>Enter your Credentials to access your account</p>
            </div>

            <div class="thha-support-form-wrap">
              <div class="thha-support-form">
                <div class="form-group">
                  <label for="name">Full Name</label>
                  <input
                    id="name"
                    name="name"
                    placeholder="Enter your full name"
                    type="text"
                  />
                </div>
                <div class="form-group">
                  <label for="email">Email</label>
                  <input
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    type="email"
                  />
                </div>

                <div class="form-group">
                  <label for="subject">Subject</label>
                  <input
                    id="subject"
                    name="subject"
                    placeholder="Your Message Subject"
                    type="text"
                  />
                </div>

                <div class="form-group">
                  <label for="description">Description*</label>
                  <textarea
                    id="description"
                    name="description"
                    placeholder="Please Describe"
                    rows="8"
                  ></textarea>
                </div>

                <button type="button" class="thha-support-btn">
                  <span>Send Support Ticket</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Design 3 -->
    <section style="background-color: #f8fafc; padding: 100px 0">
      <div class="container">
        <h2 class="header-title">Design 3</h2>

        <div class="thha-support-system thha-presets-3">
          <div class="thha-support-wrapper">
            <div class="thha-support-header">
              <h2>
                <span>
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-life-buoy w-6 h-6 text-indigo-500"
                    aria-hidden="true"
                  >
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="m4.93 4.93 4.24 4.24"></path>
                    <path d="m14.83 9.17 4.24-4.24"></path>
                    <path d="m14.83 14.83 4.24 4.24"></path>
                    <path d="m9.17 14.83-4.24 4.24"></path>
                    <circle cx="12" cy="12" r="4"></circle>
                  </svg>
                </span>
                Support Request
              </h2>
              <p>How can we help you today?</p>
            </div>

            <div class="thha-support-form-wrap">
              <form>
                <div class="thha-form-group">
                  <label class="thha-form-label">Full Name</label>
                  <div class="thha-input-wrapper">
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="24"
                      height="24"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      class="lucide lucide-user"
                      aria-hidden="true"
                    >
                      <path
                        d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"
                      ></path>
                      <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <input
                      type="text"
                      class="thha-form-input"
                      placeholder="John Doe"
                    />
                  </div>
                </div>

                <div class="thha-form-group">
                  <label class="thha-form-label">Email Address</label>
                  <div class="thha-input-wrapper">
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="24"
                      height="24"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      class="lucide lucide-mail"
                      aria-hidden="true"
                    >
                      <path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7"></path>
                      <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                    </svg>
                    <input
                      type="email"
                      class="thha-form-input"
                      placeholder="john@example.com"
                    />
                  </div>
                </div>

                <div class="thha-form-group">
                  <label class="thha-form-label">Message</label>
                  <div class="thha-input-wrapper">
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="24"
                      height="24"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      class="lucide lucide-message-square"
                      aria-hidden="true"
                    >
                      <path
                        d="M22 17a2 2 0 0 1-2 2H6.828a2 2 0 0 0-1.414.586l-2.202 2.202A.71.71 0 0 1 2 21.286V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"
                      ></path>
                    </svg>
                    <textarea
                      rows="4"
                      class="thha-form-textarea"
                      placeholder="Describe your issue..."
                    ></textarea>
                  </div>
                </div>

                <button type="submit" class="thha-btn-submit">
                  Send Request
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="./js/support-system.js"></script>
  </body>
</html>
