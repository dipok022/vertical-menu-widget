<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./scss/support-system.css" />
    <title>Support System</title>
  </head>
  <body>
    <!-- Design 1 -->
    <section style="background-color: #f4f6f7; padding: 100px 0">
      <div class="container">
        <h2 class="header-title">Design 1</h2>

        <div class="thha-support-system thha-presets-1">
          <div class="thha-support-wrapper">
            <div class="thha-support-img">
              <img src="./img/image.png" alt="" />
            </div>

            <div class="thha-support-form-wrap">
              <div class="thha-support-header">
                <h2>Support Request</h2>
                <p>Enter your Credentials to access your account</p>
              </div>

              <div class="thha-support-form">
                <div class="form-group">
                  <label for="name">Your Name*</label>
                  <input
                    id="name"
                    name="name"
                    placeholder="Your Name"
                    type="text"
                  />
                </div>
                <div class="form-group">
                  <label for="email">Email*</label>
                  <input
                    id="email"
                    name="email"
                    placeholder="Purchase Email Address"
                    type="email"
                  />
                </div>

                <div class="form-group">
                  <label for="subject">Subject/Your Issue*</label>
                  <input
                    id="subject"
                    name="subject"
                    placeholder="Your Message Subject"
                    type="text"
                  />
                </div>

                <div class="form-group">
                  <label for="description">Description*</label>
                  <textarea
                    id="description"
                    name="description"
                    placeholder="Please Describe"
                    rows="8"
                  ></textarea>
                </div>

                <button type="button" class="thha-support-btn">
                  <span>Send Support Ticket</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Design 2 -->
    <section style="background-color: #f4f6f7; padding: 100px 0">
      <div class="container">
        <h2 class="header-title">Design 2</h2>

        <div class="thha-support-system thha-presets-2"></div>
      </div>
    </section>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="./js/support-system.js"></script>
  </body>
</html>
